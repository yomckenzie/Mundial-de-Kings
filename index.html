<!doctype html>
<html lang="es" class="scroll-smooth">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Kings World Cup - ChessKing</title>
    <!-- Preconnect to Supabase storage so banner/prize images start downloading ASAP -->
    <link rel="preconnect" href="https://khrxddafhzvfdyivysay.supabase.co" crossorigin />
    <link rel="dns-prefetch" href="https://khrxddafhzvfdyivysay.supabase.co" />
    <!-- Preload the first banner (LCP image) -->
    <link rel="preload" as="image" href="https://khrxddafhzvfdyivysay.supabase.co/storage/v1/object/public/banners/Banner1.webp" type="image/webp" fetchpriority="high" />
    <!-- Anti-FOUC: apply dark mode before React hydrates -->
    <script>
      (function() {
        var theme = localStorage.getItem('chessking-theme');
        if (theme === 'dark' || (!theme && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
          document.documentElement.classList.add('dark');
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
