<!doctype html>
<html lang="es" class="scroll-smooth">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/LOGOSCHESSKING_N2.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Kings World Cup - ChessKing</title>
    <!-- Anti-FOUC: apply dark mode before React hydrates -->
    <script>
      (function() {
        var theme = localStorage.getItem('chessking-theme');
        if (theme === 'dark' || (!theme && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
          document.documentElement.classList.add('dark');
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
