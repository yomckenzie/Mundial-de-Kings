      (function(){

          p.style.setProperty('--l', Math.ceil(p.getTotalLength()));
        });
        var start = Date.now();
        var MIN_MS = 3000;       // mínimo visible: garantiza una pasada COMPLETA de la animación
                                 // (corona + "CARGANDO") aunque la página cargue al instante.
                                 // Si la carga tarda más que esto, el loader se queda hasta que termine.
        var hidden = false;
        window.hideCKLoader = function(){
          if(hidden) return; hidden = true;
          var wait = Math.max(0, MIN_MS - (Date.now() - start));
          setTimeout(function(){
            pre.classList.add('is-hidden');
            pre.addEventListener('transitionend', function(){ if(pre.parentNode) pre.remove(); }, { once:true });
          }, wait);
        };
        // Red de seguridad: si la app nunca avisa, se oculta solo a los 8s.
        setTimeout(window.hideCKLoader, 8000);
      })();
    </script>
